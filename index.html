<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Godot Video Converter</title>
    </head>
    <body>
        <h1>Godot Video Converter</h1>
        <form
            id="video-form"
            method="post"
            enctype="multipart/form-data"
            action="http://127.0.0.1:8000/upload"
        >
            <div class="input-wrapper">
                <input id="input-files" type="file" accept="video/*" multiple />
                <button id="convert-button">Convert Videos</button>
                <button id="upload-button">Upload Videos</button>
            </div>
        </form>
        <div class="output-wrapper">
            <p>Video Title</p>
            <button>Download Button</button>
        </div>
    </body>
    <script src="./renderer.js"></script>
</html>
