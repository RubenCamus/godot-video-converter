<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Godot Video Converter</title>
  </head>
  <body>
      <div id="root"></div>
    <h1 class="">Godot Video Converter</h1>
    <div class="w-screen p-2 flex text-7xl">
      <div class="upload-text-wrapper justify-center flex items-center">
        <img src="upload-icon.svg" alt="upload icon" />
        <span class="text-8xl text-amber-400">Drag files here</span>
        <span>or select files from your computer</span>
        <button>Upload Files</button>
        <span>MP4, AVI, MOV, MKV</span>
      </div>
    </div>
    <div class="input-wrapper">
      <input id="input-files" type="file" accept="video/*" multiple />
      <button id="convert-button">Convert Videos</button>
      <button id="upload-button">Upload Videos</button>
    </div>
    <div class="output-wrapper">
      <p>Video Title</p>
      <button>Download Button</button>
    </div>
  </body>
  <script src="./src/renderer.ts"></script>
  <script type="module" src="./src/App.tsx"></script>
</html>
